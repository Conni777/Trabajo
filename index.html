<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Cirujano del DOM</title>
    <style>
        /* Modo Oscuro / Dark Mode Profesional */
        :root {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #00ff88;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background-color: var(--bg-container);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            color: var(--accent);
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .controles {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 12px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #00cc6a;
        }

        button:active {
            transform: scale(0.98);
        }

        #listaElementos {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #listaElementos li {
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>El Cirujano del DOM</h1>
        <div class="controles">
            <!-- Input para que el usuario escriba el texto -->
            <input type="text" id="textoInput" placeholder="Escribe un texto seguro..." autocomplete="off">
            <!-- Botón para inyectar el elemento -->
            <button id="btnInyectar">Inyectar Elemento</button>
        </div>
        <!-- Lista donde se inyectarán los elementos (DOM) -->
        <ul id="listaElementos"></ul>
    </div>

    <!-- DOM -->
    <script src="app.js"></script>

    <!-- REACT (AGREGADO) -->
    <div id="root"></div>
    <script type="module" src="main.jsx"></script>

</body>
</html>
